<!DOCTYPE html>
<html>
<head>
    <title>RecycleX Dashboard</title>
    <style>
        body { margin:0; min-height:100vh; background:linear-gradient(135deg,#11998e,#38ef7d); font-family:Arial, sans-serif; }
        .header { text-align:center; color:white; padding:40px; position: relative; }
        .header h1 { font-size:35px; }
        
       
        .nav-controls { 
            position: absolute; top: 10px; left: 20px; right: 20px; 
            display: flex; justify-content: space-between; z-index: 1000; 
        }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .logout-btn { background: #e74c3c; color: white; }
        .home-link { background: #fff; color: #11998e; }
        
        .dashboard { display:flex; justify-content:center; flex-wrap:wrap; gap:30px; padding:30px; }
        .card { width:230px; height:120px; background:white; border-radius:20px; display:flex; justify-content:center; align-items:center; font-size:20px; font-weight:bold; color:#11998e; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.3); transition:0.3s; }
        .card:hover { background:#11998e; color:white; transform:translateY(-10px); }
      
        #displayArea { margin: 20px auto; width: 95%; display: none; text-align: center; }
        #contentFrame { width: 100%; height: 700px; border: none; border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-controls">
        <a href="index.html" class="btn home-link">Back to Home</a>
        <button onclick="confirmLogout()" class="btn logout-btn">Logout</button>
    </div>
    <h1>♻️ RecycleX Admin Dashboard</h1>
    <p>Manage RecycleX Entities</p>
</div>

<div class="dashboard">
    <div class="card" id="users-card" onclick="openPage('users-home.html')">👤 System Users</div>
    <div class="card" id="collections-card" onclick="openPage('collections-home.html')">♻️ Collection Requests</div>
    <div class="card" id="facilities-card" onclick="openPage('facilities-home.html')">🏭 Recycling Facilities</div>
    <div class="card" id="batches-card" onclick="openPage('batches-home.html')">📦 Processing Batches</div>
    <div class="card" id="items-card" onclick="openPage('items-home.html')">🔄 Recyclable Items</div>
</div>

<div id="displayArea">
    <iframe id="contentFrame" src=""></iframe>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("jwt_token");
        const role = localStorage.getItem("user_role");

        if (!token) {
            alert("Please login first.");
            window.location.href = "login.html";
            return;
        }

       
        if (role === "USER") {
            document.getElementById("users-card").style.display = "none";
            document.getElementById("facilities-card").style.display = "none";
            document.getElementById("batches-card").style.display = "none";
            document.getElementById("items-card").style.display = "none";
        } else if (role === "TRAINER") {
            document.getElementById("users-card").style.display = "none";
            document.getElementById("collections-card").style.display = "none";
        } else if (role === "ADMIN") {
            document.getElementById("batches-card").style.display = "none";
        }
    });

    function openPage(page) {
        const displayArea = document.getElementById("displayArea");
        const contentFrame = document.getElementById("contentFrame");
        displayArea.style.display = "block";
        contentFrame.src = page;
        displayArea.scrollIntoView({ behavior: 'smooth' });
    }

    function confirmLogout() {
        if (confirm("Are you sure you want to logout?")) {
            localStorage.clear();
            window.location.href = "login.html";
        }
    }
</script>

</body>
</html>
