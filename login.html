<!DOCTYPE html>
<html>
<head>
    <title>RecycleX Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
      
        .navbar { background: #11998e; padding: 15px; color: white; display: flex; gap: 20px; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; }
        
        .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        
      
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input { width: 90%; padding: 12px; margin: 0; border: 1px solid #ddd; border-radius: 8px; }
        
        button { width: 95%; padding: 12px; background: #11998e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .register-link { margin-top: 15px; font-size: 14px; }
        .register-link a { color: #11998e; text-decoration: none; font-weight: bold; }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html">🏠 Home</a>
        <a href="login.html">🔑 Login</a>
        <a href="register.html">📝 Register</a>
    </div>

    <div class="login-container">
        <div class="login-card">
            <h1>Login</h1>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" id="login-btn">LOGIN</button>
            </form>
            <div id="login-error" class="error"></div>
            
            <p class="register-link">
                Don't have an account? <br>
                <a href="register.html">Register Here</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE = "https://fullstackbackend-1-saju.onrender.com";

        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;
            const errorDiv = document.getElementById("login-error");
            const btn = document.getElementById("login-btn");

            errorDiv.innerHTML = "";
            btn.disabled = true;
            btn.innerHTML = "Logging in...";

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, password: password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("jwt_token", data.token);
                    localStorage.setItem("user_role", data.role);
                    window.location.href = "dashboard.html";
                } else {
                    const msg = await response.text();
                    errorDiv.innerHTML = msg || "Invalid Email or Password!";
                }
            } catch (err) {
                errorDiv.innerHTML = "Backend unreachable!";
            } finally {
                btn.disabled = false;
                btn.innerHTML = "LOGIN";
            }
        });
    </script>
</body>
</html>
